steps:
  # Write public env vars to .env.production so Next.js bakes them in at build time
  - name: 'ubuntu'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'echo "NEXT_PUBLIC_MAPBOX_TOKEN=${_MAPBOX_TOKEN}" > .env.production'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/aura-frontend:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/aura-frontend:latest']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'aura-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/aura-frontend:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/aura-frontend:latest'

substitutions:
  _MAPBOX_TOKEN: ''
